version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: naveenpranesh
      POSTGRES_DB: swiftpaste
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  # To view the db in pgadmin Tool
  pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
      - 5050:80
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
    - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]

  api:
    build:
      context: .
      target: ${ENV:-dev} 
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ${API_MOUNT:-.:/app}
    working_dir: /app
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv
    command: ${API_COMMAND:-uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload}

  migrate:
    build:
      context: .
      target: ${ENV:-dev}
    env_file:
      - .env
    depends_on:
      - db
    command: ["uv", "run", "alembic", "upgrade", "head"]
    restart: "no"
    working_dir: /app
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv
    volumes:
      - ${API_MOUNT:-.:/app}

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  pgadmin_data: