services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"         
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
  api:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - migrate
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv


  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: naveenpranesh
      POSTGRES_DB: swiftpaste
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  migrate:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    command: ["uv", "run", "alembic", "upgrade", "head"]
    restart: "no"
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"   
    command: ["redis-server", "--appendonly", "no"]

volumes:
  pgdata: